# GEO-CONFIG — Хорватия (HR)
geo: hr
country_name: Croatia
language: hr
language_name: Croatian
timezone: Europe/Zagreb
tone: >
  Passionate, local-pride Croatian. Football is huge; national-team pride is real.
  Lead with the hook (result / stat), never the brand. Bold and emotional.
local_context:
  primary_sports: [football, basketball]
  football_angle: >
    Football-first, strong national-team identity. WC content can lean into
    pride and rivalry, tied to a betting/prediction angle.
  cultural_notes:
    - "HNL clubs (Dinamo, Hajduk, Rijeka) and the national team resonate strongly."
telegram:
  # Несколько назначений на гео: канал(ы) + паблик(и). Менеджер сам выбирает, куда постить
  # (авторассылки нет). Невыставленные ${ENV} автоматически отбрасываются — можно оставить один.
  destinations:
    - id: "${HR_CHANNEL_ID}"          # основной канал
      label: "HR канал"
    - id: "${HR_PUBLIC_ID}"           # паблик/группа (опц.; не задан -> игнорируется)
      label: "HR паблик"
  pin_offer: true

# Email-выход (как в образце письма: личное сообщение от «Zlatan» с пиком + бонусом).
# По умолчанию HR постит только в Telegram. Чтобы включить письма — добавь сверху:
#   outputs: [telegram, email]
# и заполни ${HR_MC_*} в .env.
email:
  audiences: [warm]
  sender_persona: "Zlatan"
  sign_off: "Želimo vam i dalje puno uspjeha,\nZlatan"
  warm:
    list_id: "${HR_MC_LIST_ID}"
    segment_id: "${HR_MC_WARM_SEGMENT}"
    from_name: "${HR_MC_FROM_NAME}"
    reply_to: "${HR_MC_REPLY_TO}"
  cold:
    list_id: "${HR_MC_LIST_ID}"
    segment_id: "${HR_MC_COLD_SEGMENT}"
    from_name: "${HR_MC_FROM_NAME}"
    reply_to: "${HR_MC_REPLY_TO}"
offer:
  brand: "${HR_BRAND}"
  affiliate_url: "${HR_AFFILIATE_URL}"
  subid_param: "subid"
  promo_code: "${HR_PROMO_CODE}"
  bonus_line: "Za nove igrače: 100% do 100€ + besplatni spinovi"
compliance:
  min_age: 18
  must_include: ["Jasna oznaka 18+", "Podsjetnik o odgovornom igranju", "Poveznica na uvjete / T&C"]
  forbidden: ["Formulacije o zajamčenom dobitku", "Obećanja o profitu", "Izmišljeni brojevi / statistika"]
  responsible_gambling_line: "18+ | Igraj odgovorno | mreža za podršku"
