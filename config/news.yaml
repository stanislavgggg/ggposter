# ============================================================
#  NEWS-CONFIG — инфоповоды (Слой 1)
#  Система реагирует на новости, не только на завершённые матчи.
# ============================================================

enabled: true

source:
  type: rss                  # rss (надёжно, без токена, с описаниями) | apify (GDELT-актор)

  # RSS уважаемых футбольных изданий. Курируется редакцией -> низкий шум, есть описание.
  # Можно добавить локальные LT-фиды (15min.lt/sportas, delfi.lt) для местного угла.
  feeds:
    - "https://feeds.bbci.co.uk/sport/football/rss.xml"
    - "https://www.skysports.com/rss/12040"          # Sky Sports — Football
  max_per_feed: 15

# Фильтр релевантности (подстроки в title/summary). Пусто [] = брать все футбольные новости.
# Сузь под ЧМ, если канал только про мундиаль: ["World Cup", "Mundial", "Pasaulio taurė"]
keywords: []

# --- Apify-фолбэк (если source.type: apify) ---
apify:
  actor_id: "cloud9_ai/gdelt-news-scraper"
  run_input:
    mode: "search"
    query: "World Cup 2026"
    maxResults: 50
  field_map:
    id: "url"
    title: "title"
    summary: "description"
    url: "url"
    source: "domain"
    finished_at: "seendate"
