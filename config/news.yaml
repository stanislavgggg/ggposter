# ============================================================
#  NEWS-CONFIG — инфоповоды (Слой 1)
#  Система реагирует на новости, не только на завершённые матчи.
# ============================================================

enabled: true

source:
  type: rss                  # rss (надёжно, без токена, с описаниями) | apify (GDELT-актор)

  # RSS строго футбольных разделов (низкий шанс кросс-постов из других видов спорта).
  feeds:
    - "https://feeds.bbci.co.uk/sport/football/rss.xml"
    - "https://www.theguardian.com/football/rss"
  max_per_feed: 15

# Фильтр релевантности (подстроки в title/summary). Пусто [] = брать все футбольные новости.
keywords: []

# Отсев чужих видов спорта (если фид иногда кросс-постит). Совпадение -> новость выбрасывается.
exclude_keywords:
  - "cricket"
  - "Test match"
  - "wicket"
  - "Bazball"
  - "Bazeball"
  - "rugby"
  - "tennis"
  - "NBA"
  - "golf"
  - "Formula 1"
  - "boxing"
  - "UFC"
  - "NFL"
  - "baseball"

# --- Apify-фолбэк (если source.type: apify) ---
apify:
  actor_id: "cloud9_ai/gdelt-news-scraper"
  run_input:
    mode: "search"
    query: "World Cup 2026"
    maxResults: 50
  field_map:
    id: "url"
    title: "title"
    summary: "description"
    url: "url"
    source: "domain"
    finished_at: "seendate"
