# ============================================================
#  SPORT-CONFIG — Футбол (ЧМ-2026 в фокусе)
#  Слой 4: добавить теннис/киберспорт = новый файл + актор,
#  слои генерации и публикации не трогаешь.
# ============================================================

sport: football
sport_emoji: "⚽"

# --- Какие лиги/турниры отслеживаем (фильтр + триггер генерации) ---
# Подстрока, регистронезависимо. "World Cup" ловит и "FIFA World Cup", и "World Cup".
# Этот актор НЕ умеет фильтровать по турниру на своей стороне — он отдаёт весь футбол
# за дату, а мы фильтруем здесь. Если ловишь лишнее (напр. молодёжный/женский ЧМ) — сузь.
leagues:
  - "World Cup"

# --- Триггер: пост генерируется, когда матч завершён ---
trigger:
  required_fields: [home, away, score_home, score_away]
  # сколько дней назад тянуть (T-0 = сегодня, T-1 = вчера); ingest бьёт по датам
  lookback_days: 1

# --- Какие стат-поля важны (попадают в контекст промпта) ---
# Промпт использует ТОЛЬКО реально пришедшие поля (защита от выдуманных цифр).
key_stats: [shots, shots_on_target, possession, xg, top_scorer, red_cards]

# --- Слой 1: источники (РЕАЛЬНЫЕ Apify-акторы) -------------------------------
# ingest актор-агностичен: каждый источник описывает run_input + field_map.
# Смена актора = правка этого блока, без правки кода.
#
# ${MATCH_DATE} ingest подставляет автоматически (YYYY-MM-DD по lookback_days).
# field_map / stat_map используют dot-path по выходному JSON актора.
# ВАЖНО: пути ниже — под типичную структуру Sofascore; СВЕРЬ с реальным
#        выводом актора (одна строка датасета) и поправь при необходимости.
sources:
  - name: sofascore
    actor_id: "maximedupre/sofascore-live-events-scraper"
    enabled: true
    parser: sofascore_scheduled        # актор-специфичный адаптер (см. ingest.PARSERS)
    timeout_secs: 600                   # лимит запуска актора (.call). Дефолт актора 300 ловил TIMED-OUT,
                                        # т.к. includeMatchDetails дотягивает детали по каждому матчу. Можно
                                        # переопределить env APIFY_TIMEOUT_SECS.
    run_input:
      mode: "scheduledEvents"          # единственный режим «по дате» у этого актора
      sport: "football"
      date: "${MATCH_DATE}"            # ingest подставит дату(ы) по lookback_days
      maxItems: 25                     # БЮДЖЕТ СКАНИРОВАНИЯ за дату (весь футбол), НЕ число постов.
                                        # Меньше = быстрее/дешевле, но рискуешь не зацепить нужный матч,
                                        # если в этот день много матчей других лиг (MLS/Brazil/Скандинавия летом).
      includeMatchDetails: true        # ОБЯЗАТЕЛЬНО: без него актор не вернёт incidents ->
                                        # парсер не увидит FT/счёт/голы -> 0 событий. Это же — основная
                                        # нагрузка/время запуска (детали тянутся по каждому матчу).
    # field_map/stat_map не нужны: парсер берёт счёт/статы из incidents (FT),
    # т.к. верхний score и eventStatus у этого актора ненадёжны.

  # --- Альтернативы / резерв (enabled:false) ---
  - name: sofascore_parseforge
    actor_id: "parseforge/sofascore-live-scraper"
    enabled: false
    run_input: { mode: "events", sport: "football", date: "${MATCH_DATE}" }
    finished_values: ["finished", "ended"]
    field_map:
      match_id: "id"
      home: "homeTeam.name"
      away: "awayTeam.name"
      score_home: "homeScore.current"
      score_away: "awayScore.current"
      status: "status.description"
      league: "tournament.name"
      finished_at: "startTimestamp"
    stat_map: {}

  - name: openligadb_wc            # явно покрывает FIFA World Cup + голеадоры
    actor_id: "parseforge/openligadb-football-matches-scraper"
    enabled: false
    run_input: { mode: "matches", league: "FIFA World Cup", season: "2026" }
    finished_values: ["finished"]
    field_map:
      match_id: "matchID"
      home: "team1.teamName"
      away: "team2.teamName"
      score_home: "matchResults.pointsTeam1"
      score_away: "matchResults.pointsTeam2"
      status: "matchIsFinished"
      league: "leagueName"
      finished_at: "matchDateTimeUTC"
    stat_map: { top_scorer: "goals" }

  - name: flashscore
    actor_id: "statanow/flashscore-scraper-live"
    enabled: false
    run_input: { sport: "football", dayOffsets: ["0", "-1"] }
    finished_values: ["finished", "FT"]
    field_map:
      match_id: "matchId"
      home: "home"
      away: "away"
      score_home: "homeScore"
      score_away: "awayScore"
      status: "status"
      league: "league"
      finished_at: "startTime"
    stat_map: {}

# --- xG-обогащение (опционально, отдельный шаг) ---
#   parseforge/fbref-scraper  |  mirthful_radish/understat-xg-football-scraper

# --- xG-обогащение (опционально, отдельный шаг enrich.py; ENRICH=true) ---
# Best-effort merge по нормализованным именам команд. Поправь field_map под актора.
enrichers:
  - name: understat_xg
    actor_id: "mirthful_radish/understat-xg-football-scraper"
    enabled: false
    merges: [xg]                       # какие поля доливать в key_stats
    run_input: { league: "World Cup", season: "2026" }
    field_map:
      team: "team"                     # имя команды в выводе актора
      xg: "xG"
  # FBref как альтернатива: parseforge/fbref-scraper
  # Травмы/трансферы (контекст, не статы): Transfermarkt-актор -> можно лить в raw

angle_hints:
  - "Неожиданный результат / апсет"
  - "Крупный счёт / разгром"
  - "Индивидуальный перформанс (хет-трик, дубль, ассисты)"
  - "Контраст с котировками до матча"
